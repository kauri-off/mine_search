syntax = "proto3";

package worker;

// Control plane between a worker and the backend.
//
// Workers DIAL the backend. The backend is the gRPC server; each worker opens
// a long-lived bidirectional `Session` stream: it sends Register, periodic
// Heartbeats and ScanResults, and receives ServerCommands (ping/scan tasks,
// live config changes, pause/resume/shutdown). The unary `FetchUpdateTargets`
// lets a worker pull the set of servers it should re-ping during an update
// cycle (the backend owns the database, so the worker cannot read it directly).
service WorkerControl {
  rpc Session(stream WorkerMessage) returns (stream ServerCommand);
  // Server-streaming: the backend yields one UpdateTarget per row instead of
  // buffering the whole `servers` table into a single message (which would blow
  // the gRPC message-size limit as the table grows).
  rpc FetchUpdateTargets(FetchUpdateTargetsRequest) returns (stream UpdateTarget);
}

// Mirrors `[worker]` in config.toml — the live-tunable knobs the frontend can edit.
message WorkerConfig {
  int32 threads = 1;
  bool search_module = 2;
  bool update_module = 3;
  bool update_with_connection = 4;
  bool only_update_spoofable = 5;
  bool only_update_cracked = 6;
  uint32 update_interval_secs = 7; // seconds between update cycles
  uint32 update_concurrency = 8;   // max concurrent re-probes during an update cycle
}

// Worker -> backend, multiplexed over the Session stream.
message WorkerMessage {
  oneof kind {
    Register register = 1;
    Heartbeat heartbeat = 2;
    ScanResult result = 3;
  }
}

message Register {
  string worker_id = 1;
  optional string name = 2;
  WorkerConfig config = 3;
  string version = 4; // worker crate version, for display
}

message Heartbeat {
  WorkerMetrics metrics = 1;
}

message WorkerMetrics {
  uint64 servers_found = 1;   // servers discovered this process lifetime
  uint64 ips_scanned = 2;     // total random IPs probed
  double scan_rate = 3;       // probes/sec, recent window
  uint64 uptime_secs = 4;
  bool searching = 5;
  bool updating = 6;
  uint32 active_threads = 7;
  uint64 update_done = 8;      // targets re-probed in the current/last update cycle
  uint64 update_total = 9;     // total targets in the current/last update cycle
  double update_rate = 10;     // re-probes/sec, recent window
  int64 last_update_unix = 11; // epoch secs of last finished cycle; 0 = never
}

// Worker -> backend: the outcome of probing a single address.
message ScanResult {
  oneof outcome {
    // Newly probed via the search/scan path (upsert-by-ip, conflict only bumps
    // updated_at/is_online/favicon).
    ServerReport discovered = 1;
    // Re-probed during an update cycle / on-demand ping (full field update by
    // ip).
    ServerReport updated = 2;
    // Re-probe failed during an update: mark the server offline.
    ServerOffline offline = 3;
  }
  // Stable per-result id (UUID) assigned by the worker, persisted in its outbox.
  // The backend uses it as an idempotency key so at-least-once replays do not
  // duplicate writes, and echoes it back in an `Ack` once durably persisted.
  string result_id = 4;
}

message ServerReport {
  string ip = 1;
  int32 port = 2;
  string version_name = 3;
  int32 protocol = 4;
  string description_json = 5; // serde_json::Value, serialized
  int32 players_online = 6;
  int32 players_max = 7;
  repeated string player_names = 8;
  bool requires_mods = 9;
  optional string favicon = 10;
  optional int64 ping = 11;
  // Present for every `discovered` report; present for `updated` only when the
  // worker was asked to probe with a login connection (`with_connection`).
  optional ServerExtra extra = 12;
}

message ServerExtra {
  bool is_online_mode = 1;
  optional string disconnect_reason_json = 2;
}

message ServerOffline {
  string ip = 1;
}

// Backend -> worker, over the Session stream.
message ServerCommand {
  oneof cmd {
    PingTask ping = 1;        // replaces the ping_requests table
    ScanTask scan = 2;        // replaces the scan_targets table
    WorkerConfig set_config = 3; // live config update from the frontend
    Control control = 4;
    SetName set_name = 5;     // operator renamed the worker from the frontend
    Ack ack = 6;             // a ScanResult was durably persisted; drop it from the outbox
  }
}

// Backend -> worker: confirms a ScanResult (by its `result_id`) is durably
// persisted, so the worker can prune it from its outbox.
message Ack {
  string result_id = 1;
}

// Operator-supplied display name pushed from the frontend. The worker persists
// it to its config file so the new name survives restarts. An absent/empty name
// clears the override.
message SetName {
  optional string name = 1;
}

message PingTask {
  string ip = 1;
  int32 port = 2;
  bool with_connection = 3;
}

message ScanTask {
  string ip = 1;
  int32 port = 2;
}

enum Control {
  CONTROL_UNSPECIFIED = 0;
  CONTROL_PAUSE_SEARCH = 1;
  CONTROL_RESUME_SEARCH = 2;
  CONTROL_SHUTDOWN = 3;
  CONTROL_ABORT_UPDATE = 4;    // interrupt the running update cycle
  CONTROL_TRIGGER_UPDATE = 5;  // start an update cycle now, skipping the interval wait
}

message FetchUpdateTargetsRequest {
  string worker_id = 1;
  bool only_spoofable = 2;
  bool only_cracked = 3;
}

message UpdateTarget {
  string ip = 1;
  int32 port = 2;
  bool with_connection = 3;
}
