server {
    listen 80;
    server_name localhost;

    # Frontend ⇆ backend gRPC-web. tonic-web serves this over HTTP/1.1, so a
    # plain proxy_pass works; disable buffering so server-streaming RPCs flush.
    location /api.Api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_buffering off;
        client_max_body_size 50M;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Native gRPC (HTTP/2) endpoint for remote workers and masscan_wrapper. The
# backend speaks h2c on :3000. For production, terminate TLS here:
#   listen 50051 ssl http2;
#   ssl_certificate     /certs/server.pem;
#   ssl_certificate_key /certs/server.key;
# and point [worker].backend_url at https://<host>:50051.
server {
    listen 50051 http2;
    server_name localhost;

    location / {
        grpc_pass grpc://backend:3000;
    }
}
