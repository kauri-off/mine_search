server {
    listen 80;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1000;

    root /usr/share/nginx/html;

    # Hashed, content-addressed build assets. Cache them forever, but NEVER fall
    # back to index.html: a chunk that is missing after a redeploy must return a
    # real 404 instead of HTML, otherwise the browser tries to execute index.html
    # as a module script and fails the strict MIME-type check.
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA routes fall back to the app shell.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html references the current chunk hashes, so it must never be cached;
    # a stale copy would keep pointing returning clients at deleted chunks.
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }
}
