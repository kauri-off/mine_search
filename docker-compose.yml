services:
  postgres:
    # Pinned major version: a silent `latest` bump to a new major would refuse to
    # start against a data dir initialized by the previous major. Bump deliberately.
    image: postgres:16
    container_name: postgres-container
    # Exclude from watchtower auto-updates so the DB is never upgraded unattended.
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    environment:
      # These vars only apply on first container creation.
      # To change them on an existing DB, connect manually and run ALTER ROLE / ALTER DATABASE.
      POSTGRES_USER: user
      POSTGRES_PASSWORD: change_me
      POSTGRES_DB: mine_search_db
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U user -d mine_search_db
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
  worker:
    image: ghcr.io/kauri-off/mine_search/worker:latest
    volumes:
      - ./config.toml:/app/config.toml:ro
    networks:
      - app-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
  backend:
    image: ghcr.io/kauri-off/mine_search/backend:latest
    volumes:
      - ./config.toml:/app/config.toml:ro
    networks:
      - app-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
  frontend:
    image: ghcr.io/kauri-off/mine_search/frontend:latest
    depends_on:
      - backend
    networks:
      - app-network
    restart: unless-stopped
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - 8080:80
    depends_on:
      - backend
      - frontend
    networks:
      - app-network
    restart: unless-stopped
  watchtower:
    image: containrrr/watchtower
    environment:
      - WATCHTOWER_POLL_INTERVAL=3600
      - WATCHTOWER_CLEANUP=true
      - DOCKER_API_VERSION=1.44
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
networks:
  app-network:
volumes:
  postgres-data:
