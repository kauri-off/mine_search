services:
  postgres:
    # Pinned major version: a silent `latest` bump to a new major would refuse to
    # start against a data dir initialized by the previous major. Bump deliberately.
    image: postgres:18
    container_name: postgres-container
    # Exclude from watchtower auto-updates so the DB is never upgraded unattended.
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    environment:
      # These vars only apply on first container creation.
      # To change them on an existing DB, connect manually and run ALTER ROLE / ALTER DATABASE.
      POSTGRES_USER: user
      POSTGRES_PASSWORD: change_me
      POSTGRES_DB: mine_search_db
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U user -d mine_search_db
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    volumes:
      # PG18's image uses a versioned PGDATA (/var/lib/postgresql/18/docker), so the
      # volume must mount the parent dir — NOT /var/lib/postgresql/data (pre-18 layout).
      - postgres-data:/var/lib/postgresql
    restart: unless-stopped
  worker:
    image: ghcr.io/kauri-off/mine_search/worker:latest
    # Opt in to watchtower (it runs in label-enabled mode, so only labelled
    # containers are updated — never unrelated containers on the same host).
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    volumes:
      # Read-write: the worker rewrites its live-tunable [worker] keys when
      # retuned from the UI, so edits persist across restarts.
      - ./worker.toml:/app/worker.toml:rw
    networks:
      - app-network
    restart: unless-stopped
    # gRPC workers talk to the backend, not the database.
    depends_on:
      - backend
  backend:
    image: ghcr.io/kauri-off/mine_search/backend:latest
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    volumes:
      - ./config.toml:/app/config.toml:ro
    networks:
      - app-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
  frontend:
    image: ghcr.io/kauri-off/mine_search/frontend:latest
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    depends_on:
      - backend
    networks:
      - app-network
    restart: unless-stopped
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - 8080:80
      # Native gRPC endpoint for REMOTE workers (and masscan_wrapper). Add TLS
      # in production — see nginx.conf.
      - 50051:50051
    depends_on:
      - backend
      - frontend
    networks:
      - app-network
    restart: unless-stopped
  watchtower:
    image: containrrr/watchtower
    environment:
      - WATCHTOWER_POLL_INTERVAL=3600
      - WATCHTOWER_CLEANUP=true
      - DOCKER_API_VERSION=1.44
      # Only manage containers explicitly labelled
      # `com.centurylinklabs.watchtower.enable=true`. Without this, watchtower
      # tries to update EVERY container on the host (incl. unrelated ones).
      - WATCHTOWER_LABEL_ENABLE=true
      # Enable the HTTP API so the backend's "update stack" button can trigger a
      # run on demand (POST /v1/update). Keep the periodic poll running too —
      # enabling the API otherwise disables scheduled checks.
      - WATCHTOWER_HTTP_API_UPDATE=true
      - WATCHTOWER_HTTP_API_PERIODIC_POLLS=true
      # Must match [backend].watchtower_token in config.toml.
      - WATCHTOWER_HTTP_API_TOKEN=change_me_watchtower_token
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    # Join app-network so the backend can reach the HTTP API at http://watchtower:8080.
    networks:
      - app-network
    restart: unless-stopped
networks:
  app-network:
volumes:
  postgres-data:
