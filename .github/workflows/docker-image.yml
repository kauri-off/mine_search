name: Docker Image CI

on:
  push:
    branches: ["master"]

permissions:
  contents: read
  packages: write

jobs:
  # Both Rust images come from the same Dockerfile (rust.Dockerfile) and share
  # one dependency-compile layer, so they build sequentially in one job: the
  # second build reuses the first's layers from the local buildx cache.
  build-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: rust.Dockerfile
          target: worker
          push: true
          tags: ghcr.io/${{ github.repository }}/worker:latest
          cache-from: type=gha,scope=rust
          cache-to: type=gha,scope=rust,mode=max

      - name: Build and Push Backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: rust.Dockerfile
          target: backend
          push: true
          tags: ghcr.io/${{ github.repository }}/backend:latest
          cache-from: type=gha,scope=rust
          cache-to: type=gha,scope=rust,mode=max

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend.Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max
