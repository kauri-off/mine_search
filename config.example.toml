[database]
# Required by the backend (it owns the DB) and by workers built with the
# `diesel` feature. Default gRPC workers do NOT need this.
url = "postgres://user:change_me@postgres-container/mine_search_db"
# Format: postgres://<POSTGRES_USER>:<POSTGRES_PASSWORD>@postgres-container/<POSTGRES_DB>
# If you change user or password here, update the matching variables in docker-compose.yml:
#   POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB

[backend]
password   = "change_me"
# Set a stable secret for production (e.g. `openssl rand -hex 32`). If left empty a
# random one is generated at startup, which logs out every user on each restart/redeploy.
jwt_secret = ""
# Address the tonic gRPC server binds to (serves the frontend gRPC-web API and
# the worker control plane). Defaults to 0.0.0.0:3000.
grpc_addr  = "0.0.0.0:3000"
# Shared secret a worker must present to connect. Must match [worker].token.
# Leave empty to accept unauthenticated workers (a warning is logged).
worker_token = "change_me_worker_token"
# Optional direct TLS (alternative to terminating TLS at nginx). Set both to enable.
# tls_cert = "/certs/server.pem"
# tls_key  = "/certs/server.key"

[worker]
threads                = 500
search_module          = true
update_module          = true
update_with_connection = false
only_update_spoofable  = false
only_update_cracked    = false
log_level              = "info"

# ----- gRPC mode (default build) -----
# Backend endpoint the worker dials. Inside docker-compose this is the backend
# service directly; a remote worker uses the public gRPC endpoint, e.g.
# "https://example.com:50051".
backend_url = "http://backend:3000"
# Must match [backend].worker_token.
token       = "change_me_worker_token"
# Optional stable identity (otherwise a UUID is generated and persisted to a
# `worker_id` file). A human-friendly name is shown in the Workers UI.
# id   = "worker-eu-1"
# name = "EU worker 1"
# PEM CA bundle to trust for the backend's TLS certificate (self-signed / custom CA).
# tls_ca = "/certs/ca.pem"
